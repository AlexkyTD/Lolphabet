<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Lolphabet — Overlay</title>

    <link rel="stylesheet" href="css/overlay.css" />
    <!-- Tous les thèmes sont chargés ; chacun ne s'active que via la classe
         theme-X posée sur <body> par overlay.js. Aucune dépendance externe :
         on utilise le stack de polices système pour rester cohérent partout. -->
    <link rel="stylesheet" href="css/themes/hextech.css" />
    <link rel="stylesheet" href="css/themes/zaun.css" />
  </head>
  <body>
    <div id="carousel">
      <div id="global-counter"></div>

      <!-- Hexstream — circuit hextech d'Arcane.
           Le SVG est placé AVANT le nom et les slots pour qu'il soit
           rendu en arrière-plan : filament et particules visibles
           entre les icônes, cachés derrière elles → effet "filament
           magique qui passe par les hexgems".

           Architecture :
             - 1 filament doré le long de l'arc (le "circuit")
             - 4 particules circulant dessus, chacune avec un id SMIL
               pour pouvoir les référencer comme sources de sync :
                 * p-gold-1 (la plus grosse, dur 9s)  — cadre métallique
                 * p-gold-2 (moyenne, dur 11s)        — cadre métallique
                 * p-cyan-1 (signature, dur 10s)      — magie qui circule
                 * p-cyan-2 (petite, dur 14s)         — magie qui circule
             - 4 nœuds hexagonaux (stations) AUX positions exactes du
               path, qui scintillent (sparkle) quand une particule
               les TOUCHE réellement, via les événements SMIL
               `id.begin + offset` et `id.repeat + offset`. -->
      <svg id="hex-stream" viewBox="-110 -450 220 900"
           preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <linearGradient id="hex-spine-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#d4a544" stop-opacity="0"/>
            <stop offset="15%"  stop-color="#d4a544" stop-opacity="0.20"/>
            <stop offset="50%"  stop-color="#ffdc82" stop-opacity="0.45"/>
            <stop offset="85%"  stop-color="#d4a544" stop-opacity="0.20"/>
            <stop offset="100%" stop-color="#d4a544" stop-opacity="0"/>
          </linearGradient>

          <filter id="hex-glow" x="-150%" y="-150%" width="400%" height="400%">
            <feGaussianBlur stdDeviation="1.6" result="b"/>
            <feMerge>
              <feMergeNode in="b"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- Path partagé : courbes Bézier quadratiques passant par
               les centres des 5 slots, prolongé aux bouts pour le
               fade in/out des particules dans le vide. -->
          <path id="hex-spine"
                d="M -80,-420 Q -80,-385 -80,-360 Q -55,-285 -35,-210 Q -15,-105 0,0 Q -15,105 -35,210 Q -55,285 -80,360 Q -80,385 -80,420"
                fill="none"/>
        </defs>

        <!-- Filament visible -->
        <use href="#hex-spine"
             stroke="url(#hex-spine-grad)"
             stroke-width="1.4"
             stroke-linecap="round"
             fill="none"
             filter="url(#hex-glow)"/>

        <!-- ============= PARTICULES (4 au total, avec ids) =============
             Chaque animateMotion porte un id pour servir de source de
             sync aux sparkles des nœuds. -->

        <!-- p-gold-1 : la plus grosse (cadre métallique) -->
        <circle r="2.4" fill="#ffeb9d" filter="url(#hex-glow)">
          <animateMotion id="p-gold-1" dur="9s" repeatCount="indefinite">
            <mpath href="#hex-spine"/>
          </animateMotion>
          <animate attributeName="opacity" values="0; 0.95; 0.95; 0" keyTimes="0; 0.15; 0.85; 1" dur="9s" repeatCount="indefinite"/>
        </circle>

        <!-- p-gold-2 : moyenne (cadre métallique) -->
        <circle r="1.7" fill="#f5dfa8" opacity="0" filter="url(#hex-glow)">
          <animateMotion id="p-gold-2" dur="11s" begin="3s" repeatCount="indefinite">
            <mpath href="#hex-spine"/>
          </animateMotion>
          <animate attributeName="opacity" values="0; 0.75; 0.75; 0" keyTimes="0; 0.15; 0.85; 1" dur="11s" begin="3s" repeatCount="indefinite"/>
        </circle>

        <!-- p-cyan-1 : signature magie hextech -->
        <circle r="2.0" fill="#c8e6ff" opacity="0" filter="url(#hex-glow)">
          <animateMotion id="p-cyan-1" dur="10s" begin="1.5s" repeatCount="indefinite">
            <mpath href="#hex-spine"/>
          </animateMotion>
          <animate attributeName="opacity" values="0; 0.85; 0.85; 0" keyTimes="0; 0.15; 0.85; 1" dur="10s" begin="1.5s" repeatCount="indefinite"/>
        </circle>

        <!-- p-cyan-2 : signature, plus petite -->
        <circle r="1.5" fill="#9ecbff" opacity="0" filter="url(#hex-glow)">
          <animateMotion id="p-cyan-2" dur="14s" begin="7s" repeatCount="indefinite">
            <mpath href="#hex-spine"/>
          </animateMotion>
          <animate attributeName="opacity" values="0; 0.75; 0.75; 0" keyTimes="0; 0.15; 0.85; 1" dur="14s" begin="7s" repeatCount="indefinite"/>
        </circle>

        <!-- ============= NŒUDS HEXAGONAUX (stations) =============
             Placés EXACTEMENT sur le path, aux fractions calculées
             par arc length :
               Nœud 1 (-61, -300)  fraction 0.143
               Nœud 2 (-19, -120)  fraction 0.359
               Nœud 3 (-19, +120)  fraction 0.642
               Nœud 4 (-61, +300)  fraction 0.857

             SPARKLE SYNCHRONISÉ : chaque nœud a 4 <animateTransform>
             scale, un par particule, avec begin = "p-X.begin + Δs;
             p-X.repeat + Δs" où Δ = duration_particule × fraction.
             additive="sum" → les sparkles se composent par
             multiplication des scales si plusieurs particules sont
             au même nœud simultanément (rare).

             Calculs des offsets (D × f) :
               Node 1 (f=0.143)  gold-1: 1.29  gold-2: 1.57  cyan-1: 1.43  cyan-2: 2.00
               Node 2 (f=0.359)  gold-1: 3.23  gold-2: 3.95  cyan-1: 3.59  cyan-2: 5.03
               Node 3 (f=0.642)  gold-1: 5.78  gold-2: 7.06  cyan-1: 6.42  cyan-2: 8.99
               Node 4 (f=0.857)  gold-1: 7.71  gold-2: 9.43  cyan-1: 8.57  cyan-2: 12.00

             Sparkle : scale 1 → 1.55 → 1 sur 0.5s, keyTimes "0; 0.3; 1"
             pour rise rapide et fall plus douce (effet "checkpoint hit"). -->
        <g class="hex-nodes" filter="url(#hex-glow)">

          <!-- Nœud 1 : (-61, -300) -->
          <g transform="translate(-61, -300)">
            <polygon points="0,-6.5 5.63,-3.25 5.63,3.25 0,6.5 -5.63,3.25 -5.63,-3.25"
                     fill="none" stroke="#d4a544" stroke-width="0.8" stroke-linejoin="round">
              <animate attributeName="opacity" values="0.45; 0.85; 0.45" dur="6s" repeatCount="indefinite"/>
            </polygon>
            <circle r="1.3" fill="#c8e6ff">
              <animate attributeName="opacity" values="0.55; 1; 0.55" dur="6s" repeatCount="indefinite"/>
            </circle>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-gold-1.begin + 1.29s; p-gold-1.repeat + 1.29s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-gold-2.begin + 1.57s; p-gold-2.repeat + 1.57s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-cyan-1.begin + 1.43s; p-cyan-1.repeat + 1.43s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-cyan-2.begin + 2.00s; p-cyan-2.repeat + 2.00s"/>
          </g>

          <!-- Nœud 2 : (-19, -120) -->
          <g transform="translate(-19, -120)">
            <polygon points="0,-6.5 5.63,-3.25 5.63,3.25 0,6.5 -5.63,3.25 -5.63,-3.25"
                     fill="none" stroke="#d4a544" stroke-width="0.8" stroke-linejoin="round">
              <animate attributeName="opacity" values="0.45; 0.85; 0.45" dur="6s" begin="1.5s" repeatCount="indefinite"/>
            </polygon>
            <circle r="1.3" fill="#c8e6ff">
              <animate attributeName="opacity" values="0.55; 1; 0.55" dur="6s" begin="1.5s" repeatCount="indefinite"/>
            </circle>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-gold-1.begin + 3.23s; p-gold-1.repeat + 3.23s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-gold-2.begin + 3.95s; p-gold-2.repeat + 3.95s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-cyan-1.begin + 3.59s; p-cyan-1.repeat + 3.59s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-cyan-2.begin + 5.03s; p-cyan-2.repeat + 5.03s"/>
          </g>

          <!-- Nœud 3 : (-19, +120) -->
          <g transform="translate(-19, 120)">
            <polygon points="0,-6.5 5.63,-3.25 5.63,3.25 0,6.5 -5.63,3.25 -5.63,-3.25"
                     fill="none" stroke="#d4a544" stroke-width="0.8" stroke-linejoin="round">
              <animate attributeName="opacity" values="0.45; 0.85; 0.45" dur="6s" begin="3s" repeatCount="indefinite"/>
            </polygon>
            <circle r="1.3" fill="#c8e6ff">
              <animate attributeName="opacity" values="0.55; 1; 0.55" dur="6s" begin="3s" repeatCount="indefinite"/>
            </circle>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-gold-1.begin + 5.78s; p-gold-1.repeat + 5.78s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-gold-2.begin + 7.06s; p-gold-2.repeat + 7.06s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-cyan-1.begin + 6.42s; p-cyan-1.repeat + 6.42s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-cyan-2.begin + 8.99s; p-cyan-2.repeat + 8.99s"/>
          </g>

          <!-- Nœud 4 : (-61, +300) -->
          <g transform="translate(-61, 300)">
            <polygon points="0,-6.5 5.63,-3.25 5.63,3.25 0,6.5 -5.63,3.25 -5.63,-3.25"
                     fill="none" stroke="#d4a544" stroke-width="0.8" stroke-linejoin="round">
              <animate attributeName="opacity" values="0.45; 0.85; 0.45" dur="6s" begin="4.5s" repeatCount="indefinite"/>
            </polygon>
            <circle r="1.3" fill="#c8e6ff">
              <animate attributeName="opacity" values="0.55; 1; 0.55" dur="6s" begin="4.5s" repeatCount="indefinite"/>
            </circle>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-gold-1.begin + 7.71s; p-gold-1.repeat + 7.71s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-gold-2.begin + 9.43s; p-gold-2.repeat + 9.43s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-cyan-1.begin + 8.57s; p-cyan-1.repeat + 8.57s"/>
            <animateTransform attributeName="transform" type="scale" values="1; 1.55; 1" keyTimes="0; 0.3; 1" dur="0.5s" additive="sum"
                              begin="p-cyan-2.begin + 12.00s; p-cyan-2.repeat + 12.00s"/>
          </g>

        </g>
      </svg>

      <!-- Smogstream — Refonte v1.3 (vraiment Zaun, pas Hextech-en-vert).
           ============================================================
           2 couches visibles :
             1. Nappes de smog environnemental (3 grosses radial
                gradients diffuses qui montent lentement, dérivent
                horizontalement, grossissent). Imprègne l'overlay
                sans le saturer.
             2. Bulles avec relief 3D (radialGradient interne
                simulant un point de lumière en haut-gauche), tailles
                variées, wobble indépendant du chemin (cx animé en
                parallèle du déplacement le long du path), breath
                respiration sur le rayon. 4 bulles vertes + 1 rare
                bulle Shimmer magenta qui passe toutes les ~17s.

           Le path #smog-spine est conservé dans <defs> uniquement
           comme guide de trajectoire pour les <animateMotion> des
           bulles ; il n'est plus dessiné en tant que pipe visible.

           Cachée par défaut, visible uniquement sur le thème Zaun. -->
      <svg id="smog-stream" viewBox="-110 -450 220 900"
           preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <!-- Bulle verte avec highlight interne en haut-gauche.
               cx/cy à 35%/30% = point lumineux décalé → relief
               simulé en CSS pur, pas de SVG en couches superposées. -->
          <radialGradient id="bubble-green-grad" cx="35%" cy="30%">
            <stop offset="0%"   stop-color="rgba(255, 255, 255, 0.85)"/>
            <stop offset="22%"  stop-color="rgba(217, 255, 158, 0.55)"/>
            <stop offset="100%" stop-color="rgba(95, 196, 110, 0.25)"/>
          </radialGradient>

          <!-- Bulle Shimmer magenta avec le même principe de highlight. -->
          <radialGradient id="bubble-shimmer-grad" cx="35%" cy="30%">
            <stop offset="0%"   stop-color="rgba(255, 255, 255, 0.85)"/>
            <stop offset="22%"  stop-color="rgba(237, 148, 212, 0.60)"/>
            <stop offset="100%" stop-color="rgba(217, 67, 196, 0.30)"/>
          </radialGradient>

          <!-- Nappe de smog : très diffuse, fade aux bords. -->
          <radialGradient id="smoke-cloud-grad">
            <stop offset="0%"   stop-color="rgba(95, 196, 110, 0.40)"/>
            <stop offset="50%"  stop-color="rgba(95, 196, 110, 0.18)"/>
            <stop offset="100%" stop-color="rgba(95, 196, 110, 0)"/>
          </radialGradient>

          <!-- Nappe Shimmer occasionnelle pour la touche violacée. -->
          <radialGradient id="shimmer-cloud-grad">
            <stop offset="0%"   stop-color="rgba(217, 67, 196, 0.30)"/>
            <stop offset="50%"  stop-color="rgba(217, 67, 196, 0.12)"/>
            <stop offset="100%" stop-color="rgba(217, 67, 196, 0)"/>
          </radialGradient>

          <!-- Blur très large pour les nappes de smog : effet "brume". -->
          <filter id="smoke-heavy-blur" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="6"/>
          </filter>

          <!-- Blur subtil pour les bulles : juste un poil de glow,
               on garde la netteté du highlight. -->
          <filter id="bubble-glow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="0.7" result="b"/>
            <feMerge>
              <feMergeNode in="b"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <path id="smog-spine"
                d="M -80,-420
                   Q -80,-385 -80,-360
                   Q -55,-285 -35,-210
                   Q -15,-105 0,0
                   Q -15,105 -35,210
                   Q -55,285 -80,360
                   Q -80,385 -80,420"
                fill="none"/>
        </defs>

        <!-- ======================================================
             COUCHE 1 — Nappes de smog environnemental
             ======================================================
             3 grosses radial gradients qui dérivent du bas vers le
             haut, en grossissant et en dérivant légèrement
             horizontalement (la fumée disperse en montant). Toutes
             passent par le filtre heavy-blur pour un effet de brume
             diffuse, pas de "balle". Une des nappes est en
             magenta Shimmer pour imprégner discrètement le décor. -->
        <!-- Note importante : tous les <circle> qui ont un begin > 0
             reçoivent opacity="0" comme attribut par défaut. Sans ça,
             entre t=0 et t=begin, le cercle est rendu à sa valeur
             initiale (opacity 1 par défaut) sur sa position initiale,
             fixe → effet "pop" visible quand l'animation démarre.
             opacity="0" par défaut → invisible jusqu'à ce que
             l'animation prenne le relais. -->
        <g filter="url(#smoke-heavy-blur)">
          <!-- Nappe 1 — verte, bas-gauche → haut-gauche, large -->
          <circle cx="-65" cy="380" r="22" fill="url(#smoke-cloud-grad)">
            <animate attributeName="cy" values="380; -420" dur="22s" repeatCount="indefinite"/>
            <animate attributeName="cx" values="-65; -82; -70; -90" dur="22s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="20; 26; 32; 28" dur="22s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.70; 0.55; 0" keyTimes="0; 0.25; 0.75; 1" dur="22s" repeatCount="indefinite"/>
          </circle>
          <!-- Nappe 2 — verte, milieu-gauche → haut-droit -->
          <circle cx="-95" cy="200" r="18" fill="url(#smoke-cloud-grad)" opacity="0">
            <animate attributeName="cy" values="200; -420" dur="29s" begin="6s" repeatCount="indefinite"/>
            <animate attributeName="cx" values="-95; -75; -98; -65" dur="29s" begin="6s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="16; 22; 28" dur="29s" begin="6s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.65; 0.50; 0" keyTimes="0; 0.25; 0.75; 1" dur="29s" begin="6s" repeatCount="indefinite"/>
          </circle>
          <!-- Nappe 3 — magenta Shimmer, bas-centre → haut-gauche, lente -->
          <circle cx="-50" cy="0" r="20" fill="url(#shimmer-cloud-grad)" opacity="0">
            <animate attributeName="cy" values="0; -420" dur="35s" begin="13s" repeatCount="indefinite"/>
            <animate attributeName="cx" values="-50; -70; -55; -80" dur="35s" begin="13s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="18; 24; 30" dur="35s" begin="13s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.55; 0.40; 0" keyTimes="0; 0.25; 0.75; 1" dur="35s" begin="13s" repeatCount="indefinite"/>
          </circle>
          <!-- Nappe 4 — verte, côté droit pour aérer le côté opposé
               à l'arc des icônes. Démarre milieu-droit, monte en
               dérivant. -->
          <circle cx="55" cy="280" r="17" fill="url(#smoke-cloud-grad)" opacity="0">
            <animate attributeName="cy" values="280; -420" dur="26s" begin="3s" repeatCount="indefinite"/>
            <animate attributeName="cx" values="55; 70; 50; 80" dur="26s" begin="3s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="15; 22; 28; 24" dur="26s" begin="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.60; 0.45; 0" keyTimes="0; 0.25; 0.75; 1" dur="26s" begin="3s" repeatCount="indefinite"/>
          </circle>
          <!-- Nappe 5 — verte, petite et plus rapide pour créer un
               peu plus de mouvement perceptible. Démarre bas-droit. -->
          <circle cx="40" cy="420" r="14" fill="url(#smoke-cloud-grad)" opacity="0">
            <animate attributeName="cy" values="420; -420" dur="19s" begin="9s" repeatCount="indefinite"/>
            <animate attributeName="cx" values="40; 60; 35; 55" dur="19s" begin="9s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="12; 18; 22" dur="19s" begin="9s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.55; 0.40; 0" keyTimes="0; 0.25; 0.75; 1" dur="19s" begin="9s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- Note : la pipe industrielle visible (qui reliait les
             icônes) a été retirée. On garde le path #smog-spine
             dans <defs> car les bulles l'utilisent comme guide de
             trajectoire via <mpath>, mais elle n'est plus dessinée :
             les bulles donnent toute la structure visuelle, le
             smog ambiant donne l'atmosphère, c'est suffisant. -->

        <!-- ======================================================
             COUCHE 3 — Bulles avec relief 3D + wobble organique
             ======================================================
             Chaque bulle :
               - fill = radialGradient avec highlight haut-gauche
                 (effet "savon de chimie", pas un point lumineux)
               - stroke = bordure plus contrastée
               - animateMotion = parcours le chemin (de bas en haut)
               - animate cx = wobble horizontal indépendant
                 (déplace la bulle en LOCAL avant le transform de
                 motion → on perçoit une dérive autour du chemin)
               - animate r = breath (la bulle respire en taille)
               - animate opacity = fade in/out aux extrémités
             Tous les timings sont en nombres premiers entre eux
             (2.7s vs 1.9s vs 2.3s vs 11s vs 7s vs 9s) pour qu'aucune
             périodicité ne se synchronise → mouvement chaotique réel. -->

        <!-- Chaque bulle est enveloppée dans un <g transform="translate(X, 0)">
             avec un X différent → décale la trajectoire entière de la bulle
             horizontalement. Le path reste partagé (cohérence du chemin),
             mais visuellement les bulles ne se superposent plus sur la
             même ligne. Les offsets retenus créent une dispersion latérale
             d'environ 60 px entre la bulle la plus à gauche et la plus à
             droite, suffisante pour briser l'effet "convoi" sans pour
             autant projeter de bulles trop loin de l'arc des icônes. -->

        <!-- Bulle 1 : medium green — sur la ligne de référence. -->
        <g transform="translate(0, 0)">
          <circle r="2.8" fill="url(#bubble-green-grad)"
                  stroke="rgba(158, 255, 95, 0.85)" stroke-width="0.4"
                  opacity="0" filter="url(#bubble-glow)">
            <animateMotion dur="11s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite">
              <mpath href="#smog-spine"/>
            </animateMotion>
            <animate attributeName="cx" values="0; 2.5; -1.5; 1.8; 0" dur="2.7s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="2.6; 3.1; 2.6; 2.9; 2.6" dur="3.1s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.85; 0.85; 0" keyTimes="0; 0.15; 0.85; 1" dur="11s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- Bulle 2 : small green — décalée à droite de +28 px. -->
        <g transform="translate(28, 0)">
          <circle r="1.6" fill="url(#bubble-green-grad)"
                  stroke="rgba(158, 255, 95, 0.75)" stroke-width="0.3"
                  opacity="0" filter="url(#bubble-glow)">
            <animateMotion dur="7s" begin="2s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite">
              <mpath href="#smog-spine"/>
            </animateMotion>
            <animate attributeName="cx" values="0; -1.6; 2; -1; 0" dur="1.9s" begin="2s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="1.4; 1.9; 1.4" dur="2.3s" begin="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.78; 0.78; 0" keyTimes="0; 0.15; 0.85; 1" dur="7s" begin="2s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- Bulle 3 : tiny green — décalée à gauche de -14 px. -->
        <g transform="translate(-14, 0)">
          <circle r="1.0" fill="url(#bubble-green-grad)"
                  stroke="rgba(158, 255, 95, 0.6)" stroke-width="0.2"
                  opacity="0" filter="url(#bubble-glow)">
            <animateMotion dur="6s" begin="4s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite">
              <mpath href="#smog-spine"/>
            </animateMotion>
            <animate attributeName="cx" values="0; 2; -1; 1.5; 0" dur="1.7s" begin="4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.85; 0.85; 0" keyTimes="0; 0.15; 0.85; 1" dur="6s" begin="4s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- Bulle 4 : medium green — décalée à droite de +42 px (la
             plus à droite, hors zone des icônes). -->
        <g transform="translate(42, 0)">
          <circle r="2.2" fill="url(#bubble-green-grad)"
                  stroke="rgba(158, 255, 95, 0.85)" stroke-width="0.35"
                  opacity="0" filter="url(#bubble-glow)">
            <animateMotion dur="9s" begin="3.5s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite">
              <mpath href="#smog-spine"/>
            </animateMotion>
            <animate attributeName="cx" values="0; -2.2; 1.2; -1.5; 0" dur="2.3s" begin="3.5s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="2.0; 2.5; 2.0" dur="2.6s" begin="3.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.80; 0.80; 0" keyTimes="0; 0.15; 0.85; 1" dur="9s" begin="3.5s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- Bulle 5 : RARE Shimmer magenta — décalée à droite de +12 px. -->
        <g transform="translate(12, 0)">
          <circle r="2.0" fill="url(#bubble-shimmer-grad)"
                  stroke="rgba(237, 148, 212, 0.85)" stroke-width="0.4"
                  opacity="0" filter="url(#bubble-glow)">
            <animateMotion dur="17s" begin="9s" keyPoints="1;0" keyTimes="0;1" repeatCount="indefinite">
              <mpath href="#smog-spine"/>
            </animateMotion>
            <animate attributeName="cx" values="0; 1.8; -2; 0.8; 0" dur="2.5s" begin="9s" repeatCount="indefinite"/>
            <animate attributeName="r"  values="1.8; 2.4; 1.8" dur="2.9s" begin="9s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 0.85; 0.85; 0" keyTimes="0; 0.18; 0.82; 1" dur="17s" begin="9s" repeatCount="indefinite"/>
          </circle>
        </g>
      </svg>

      <div id="champion-name"></div>
      <div id="slots"></div>
    </div>
