<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Lolphabet — Overlay</title>

    <!-- Police Cinzel utilisée par le thème Hextech (chargée systématiquement
         pour pouvoir basculer entre thèmes sans rechargement). Mise en cache
         par le navigateur dès le premier load. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/overlay.css" />
    <!-- Tous les thèmes sont chargés ; chacun ne s'active que via la classe
         theme-X posée sur <body> par overlay.js. -->
    <link rel="stylesheet" href="css/themes/hextech.css" />
  </head>
  <body>
    <div id="carousel">
      <div id="global-counter"></div>
      <div id="champion-name"></div>
      <div id="slots"></div>
    </div>

    <script src="js/data-dragon.js"></script>
    <script src="js/positions-data.js"></script>
    <script src="js/sort-strategies.js"></script>
    <script src="js/state.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/bus.js"></script>
    <script src="js/overlay.js"></script>
  </body>
</html>
