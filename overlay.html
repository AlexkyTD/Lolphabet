<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Lolphabet — Overlay</title>

    <link rel="stylesheet" href="css/overlay.css" />
    <!-- Tous les thèmes sont chargés ; chacun ne s'active que via la classe
         theme-X posée sur <body> par overlay.js. Aucune dépendance externe :
         on utilise le stack de polices système pour rester cohérent partout. -->
    <link rel="stylesheet" href="css/themes/hextech.css" />
    <link rel="stylesheet" href="css/themes/zaun.css" />
  </head>
  <body>
    <div id="carousel">
      <div id="global-counter"></div>

      <!-- Hexstream : filière magique hextech qui parcourt l'arc du
           carrousel avec quelques particules dorées dérivantes.
           Utilisée uniquement par le thème Hextech (cachée sinon).
           Le SVG est placé AVANT le nom et les slots pour qu'il soit
           rendu en arrière-plan : on voit le filament et les
           particules entre les icônes, mais ils sont cachés derrière
           les icônes elles-mêmes pour un effet "filament magique
           qui passe par les hexgems". -->
      <svg id="hex-stream" viewBox="-110 -450 220 900"
           preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <!-- Dégradé doré le long du filament : fondu aux extrémités
               pour qu'il "naisse" et "meure" dans le vide. -->
          <linearGradient id="hex-spine-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#d4a544" stop-opacity="0"/>
            <stop offset="15%"  stop-color="#d4a544" stop-opacity="0.20"/>
            <stop offset="50%"  stop-color="#ffdc82" stop-opacity="0.45"/>
            <stop offset="85%"  stop-color="#d4a544" stop-opacity="0.20"/>
            <stop offset="100%" stop-color="#d4a544" stop-opacity="0"/>
          </linearGradient>

          <!-- Glow doux pour le filament et les particules. -->
          <filter id="hex-glow" x="-150%" y="-150%" width="400%" height="400%">
            <feGaussianBlur stdDeviation="1.6" result="b"/>
            <feMerge>
              <feMergeNode in="b"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- Path partagé par le filament visible ET les particules
               qui le suivent en mouvement. Courbes quadratiques
               passant par les centres des 5 slots, prolongées au-delà
               aux deux bouts pour que les particules apparaissent /
               disparaissent doucement dans le vide. -->
          <path id="hex-spine"
                d="M -80,-420
                   Q -80,-385 -80,-360
                   Q -55,-285 -35,-210
                   Q -15,-105 0,0
                   Q -15,105 -35,210
                   Q -55,285 -80,360
                   Q -80,385 -80,420"
                fill="none"/>
        </defs>

        <!-- Filament lui-même : visible mais discret. -->
        <use href="#hex-spine"
             stroke="url(#hex-spine-grad)"
             stroke-width="1.4"
             stroke-linecap="round"
             fill="none"
             filter="url(#hex-glow)"/>

        <!-- Particules dorées qui dérivent. Tailles, durées et délais
             différents → distribution organique, pas de "convoi". -->
        <circle r="2.4" fill="#ffeb9d" filter="url(#hex-glow)">
          <animateMotion dur="9s" repeatCount="indefinite">
            <mpath href="#hex-spine"/>
          </animateMotion>
          <animate attributeName="opacity"
                   values="0; 0.95; 0.95; 0"
                   keyTimes="0; 0.15; 0.85; 1"
                   dur="9s" repeatCount="indefinite"/>
        </circle>

        <circle r="1.7" fill="#f5dfa8" filter="url(#hex-glow)">
          <animateMotion dur="11s" begin="3s" repeatCount="indefinite">
            <mpath href="#hex-spine"/>
          </animateMotion>
          <animate attributeName="opacity"
                   values="0; 0.75; 0.75; 0"
                   keyTimes="0; 0.15; 0.85; 1"
                   dur="11s" begin="3s" repeatCount="indefinite"/>
        </circle>

        <circle r="1.4" fill="#fff5c8" filter="url(#hex-glow)">
          <animateMotion dur="13s" begin="6s" repeatCount="indefinite">
            <mpath href="#hex-spine"/>
          </animateMotion>
          <animate attributeName="opacity"
                   values="0; 0.85; 0.85; 0"
                   keyTimes="0; 0.15; 0.85; 1"
                   dur="13s" begin="6s" repeatCount="indefinite"/>
        </circle>
      </svg>

      <!-- Smogstream : équivalent Zaun du Hexstream. Pipe industrielle
           dashée (cassée) qui dégouline le long du carrousel, et bulles
           toxiques qui REMONTENT (vapeurs chimiques qui s'élèvent).
           Cachée par défaut, visible uniquement sur le thème Zaun.
           Couleurs : vert chimique (Shimmer), jaune acide. -->
      <svg id="smog-stream" viewBox="-110 -450 220 900"
           preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <defs>
          <!-- Dégradé toxique le long de la pipe : vert chimique avec
               un pic jaune-acide au milieu. Fondu aux extrémités. -->
          <linearGradient id="smog-spine-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#5fc46e" stop-opacity="0"/>
            <stop offset="15%"  stop-color="#5fc46e" stop-opacity="0.20"/>
            <stop offset="50%"  stop-color="#9eff5f" stop-opacity="0.45"/>
            <stop offset="85%"  stop-color="#5fc46e" stop-opacity="0.20"/>
            <stop offset="100%" stop-color="#5fc46e" stop-opacity="0"/>
          </linearGradient>

          <!-- Glow plus large que Hextech : la vapeur toxique est diffuse,
               pas nette comme la lumière hextech. -->
          <filter id="smog-glow" x="-150%" y="-150%" width="400%" height="400%">
            <feGaussianBlur stdDeviation="2.2" result="b"/>
            <feMerge>
              <feMergeNode in="b"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- Path identique à Hextech (cohérence structurelle), mais
               on l'utilisera EN SENS INVERSE pour les particules
               (montée des vapeurs toxiques). -->
          <path id="smog-spine"
                d="M -80,-420
                   Q -80,-385 -80,-360
                   Q -55,-285 -35,-210
                   Q -15,-105 0,0
                   Q -15,105 -35,210
                   Q -55,285 -80,360
                   Q -80,385 -80,420"
                fill="none"/>
        </defs>

        <!-- Pipe dashée : "tuyau cassé" industriel, pas un filament
             magique poli. stroke-dasharray créé un pointillé, et
             stroke-dashoffset animé fait défiler la chaîne vers le
             haut comme un flux qui s'évacue. -->
        <use href="#smog-spine"
             stroke="url(#smog-spine-grad)"
             stroke-width="1.4"
             stroke-linecap="round"
             stroke-dasharray="3 5"
             fill="none"
             filter="url(#smog-glow)">
          <animate attributeName="stroke-dashoffset"
                   values="0; 16"
                   dur="4s"
                   repeatCount="indefinite"/>
        </use>

        <!-- Bulles toxiques qui REMONTENT (keyPoints="1;0" inverse la
             direction du chemin → particules vont de bas en haut).
             Trois bulles avec tailles, durées et délais différents.
             Le radius est animé pour un effet "bulle qui respire" en
             plus du déplacement → vivantes, pas mécaniques.
             Stroke + fill semi-transparent → vraies bulles, pas points. -->

        <circle r="2.8"
                fill="rgba(158, 255, 95, 0.55)"
                stroke="rgba(158, 255, 95, 0.95)"
                stroke-width="0.4"
                filter="url(#smog-glow)">
          <animateMotion dur="11s" repeatCount="indefinite"
                         keyPoints="1;0" keyTimes="0;1">
            <mpath href="#smog-spine"/>
          </animateMotion>
          <animate attributeName="opacity"
                   values="0; 0.85; 0.85; 0"
                   keyTimes="0; 0.15; 0.85; 1"
                   dur="11s" repeatCount="indefinite"/>
          <animate attributeName="r"
                   values="2.5; 3.2; 2.5"
                   dur="2.8s" repeatCount="indefinite"/>
        </circle>

        <circle r="1.9"
                fill="rgba(95, 196, 110, 0.50)"
                stroke="rgba(95, 196, 110, 0.85)"
                stroke-width="0.3"
                filter="url(#smog-glow)">
          <animateMotion dur="9s" begin="3s" repeatCount="indefinite"
                         keyPoints="1;0" keyTimes="0;1">
            <mpath href="#smog-spine"/>
          </animateMotion>
          <animate attributeName="opacity"
                   values="0; 0.75; 0.75; 0"
                   keyTimes="0; 0.15; 0.85; 1"
                   dur="9s" begin="3s" repeatCount="indefinite"/>
          <animate attributeName="r"
                   values="1.7; 2.2; 1.7"
                   dur="2.2s" begin="3s" repeatCount="indefinite"/>
        </circle>

        <circle r="1.4"
                fill="rgba(217, 255, 158, 0.7)"
                stroke="rgba(158, 255, 95, 0.6)"
                stroke-width="0.25"
                filter="url(#smog-glow)">
          <animateMotion dur="13s" begin="6s" repeatCount="indefinite"
                         keyPoints="1;0" keyTimes="0;1">
            <mpath href="#smog-spine"/>
          </animateMotion>
          <animate attributeName="opacity"
                   values="0; 0.85; 0.85; 0"
                   keyTimes="0; 0.15; 0.85; 1"
                   dur="13s" begin="6s" repeatCount="indefinite"/>
          <animate attributeName="r"
                   values="1.2; 1.7; 1.2"
                   dur="3s" begin="6s" repeatCount="indefinite"/>
        </circle>
      </svg>

      <div id="champion-name"></div>
      <div id="slots"></div>
    </div>

    <script src="js/data-dragon.js"></script>
    <script src="js/positions-data.js"></script>
    <script src="js/sort-strategies.js"></script>
    <script src="js/state.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/bus.js"></script>
    <script src="js/overlay.js"></script>
  </body>
</html>
