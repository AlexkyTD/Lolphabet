name: 💡 Proposer une fonctionnalité
description: Suggérer une nouvelle option ou une amélioration
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Merci pour ta suggestion !
        Avant de coder quoi que ce soit, on en discute ici pour aligner l'approche.

  - type: textarea
    id: problem
    attributes:
      label: Quel problème ça résout ?
      description: Décris le besoin ou la frustration que cette feature règlerait
      placeholder: Ex. Quand je stream, mes spectateurs me demandent souvent…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solution proposée
      description: Comment tu imagines que ça devrait fonctionner ?
      placeholder: Ex. Ajouter une option qui permet de…
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagées
      description: As-tu pensé à d'autres approches ? (facultatif)
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Type de fonctionnalité
      options:
        - Nouvelle option d'affichage (overlay)
        - Nouveau mode de tri
        - Amélioration du panneau de contrôle
        - Correction de poste pour un champion
        - Autre
    validations:
      required: true
