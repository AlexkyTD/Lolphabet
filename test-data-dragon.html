<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Lolphabet — Test Data Dragon</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #111;
        color: #eee;
        padding: 2rem;
      }
      h1 { margin-top: 0; }
      .status { margin: 1rem 0; padding: 0.75rem 1rem; background: #222; border-radius: 6px; }
      .ok { color: #7fff7f; }
      .err { color: #ff7f7f; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.75rem;
        margin-top: 1.5rem;
      }
      .champ {
        text-align: center;
        background: #1a1a1a;
        padding: 0.5rem;
        border-radius: 6px;
      }
      .champ img { width: 100%; border-radius: 4px; display: block; }
      .champ .name { font-size: 0.85rem; margin-top: 0.35rem; }
      button {
        background: #3a3a3a; color: #fff; border: 1px solid #555;
        padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer;
        font-size: 0.9rem;
      }
      button:hover { background: #4a4a4a; }
    </style>
  </head>
  <body>
    <h1>🧪 Test Data Dragon</h1>
    <p>
      Cette page est un test temporaire pour valider que le module
      <code>data-dragon.js</code> charge bien la liste des champions de LoL.
      Elle sera supprimée une fois l'overlay en place.
    </p>

    <div class="status" id="status">⏳ Chargement…</div>

    <button id="clearBtn">🗑️ Vider le cache et recharger</button>

    <div class="grid" id="grid"></div>

    <script src="js/data-dragon.js"></script>
    <script>
      const statusEl = document.getElementById('status');
      const gridEl = document.getElementById('grid');
      const clearBtn = document.getElementById('clearBtn');

      async function run() {
        statusEl.textContent = '⏳ Chargement…';
        statusEl.className = 'status';
        gridEl.innerHTML = '';

        const t0 = performance.now();
        try {
          const champions = await Lolphabet.DataDragon.load();
          const ms = Math.round(performance.now() - t0);

          // Tri alphabétique par nom (locale fr).
          champions.sort((a, b) => a.name.localeCompare(b.name, 'fr'));

          statusEl.innerHTML =
            `<span class="ok">✅ ${champions.length} champions chargés en ${ms} ms</span>`;

          for (const c of champions) {
            const div = document.createElement('div');
            div.className = 'champ';
            div.innerHTML =
              `<img src="${c.iconUrl}" alt="${c.name}" loading="lazy" />` +
              `<div class="name">${c.name}</div>`;
            gridEl.appendChild(div);
          }
        } catch (err) {
          statusEl.innerHTML =
            `<span class="err">❌ Erreur : ${err.message}</span>`;
          console.error(err);
        }
      }

      clearBtn.addEventListener('click', () => {
        Lolphabet.DataDragon.clearCache();
        run();
      });

      run();
    </script>
  </body>
</html>
